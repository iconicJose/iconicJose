<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.45" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#05070d"/>
      <animate attributeName="x1" values="0;240;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1200;960;1200" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5eead4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <clipPath id="typeClip">
      <rect x="379" y="219" width="0" height="28">
        <animate attributeName="width" values="0;452;452;0" keyTimes="0;0.45;0.82;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="#1f2937" stroke-width="2"/>

  <g opacity="0.55">
    <path d="M0 76H1200" stroke="#111827"/>
    <path d="M0 144H1200" stroke="#111827"/>
    <path d="M0 212H1200" stroke="#111827"/>
    <path d="M0 280H1200" stroke="#111827"/>
    <path d="M140 0V360" stroke="#111827"/>
    <path d="M300 0V360" stroke="#111827"/>
    <path d="M460 0V360" stroke="#111827"/>
    <path d="M620 0V360" stroke="#111827"/>
    <path d="M780 0V360" stroke="#111827"/>
    <path d="M940 0V360" stroke="#111827"/>
    <path d="M1100 0V360" stroke="#111827"/>
  </g>

  <circle cx="250" cy="92" r="98" fill="url(#glow)" filter="url(#soft)" opacity="0.38">
    <animate attributeName="cx" values="250;295;250" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="92;122;92" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="246" r="120" fill="#a78bfa" filter="url(#soft)" opacity="0.22">
    <animate attributeName="cx" values="940;884;940" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="246;210;246" dur="10s" repeatCount="indefinite"/>
  </circle>

  <line x1="-280" y1="180" x2="280" y2="180" stroke="url(#line)" stroke-width="2">
    <animateTransform attributeName="transform" type="translate" values="0 0;1200 0;0 0" dur="5.5s" repeatCount="indefinite"/>
  </line>

  <g opacity="0.9">
    <circle cx="198" cy="236" r="4" fill="#5eead4">
      <animate attributeName="cy" values="236;220;236" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1014" cy="112" r="4" fill="#38bdf8">
      <animate attributeName="cy" values="112;128;112" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="910" cy="298" r="3" fill="#c4b5fd">
      <animate attributeName="cy" values="298;282;298" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="600" y="151" text-anchor="middle" fill="#f8fafc" font-size="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800" letter-spacing="2">JOSE</text>
  <text x="600" y="191" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="5">ICONICJOSE</text>

  <g clip-path="url(#typeClip)">
    <text x="379" y="241" fill="#d1d5db" font-size="22" font-family="Consolas, Menlo, monospace">building minimal things that move</text>
  </g>
  <rect x="824" y="219" width="3" height="28" fill="#5eead4">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="306" text-anchor="middle" fill="#64748b" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">web projects / creative tools / small business systems</text>
</svg>
